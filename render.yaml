databases:
  - name: m-motors-db
    plan: free
    databaseName: m_motors
    user: m_motors

services:
  - type: web
    name: m-motors-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: m-motors-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "5"

# Le frontend est un repo Git distinct (m-motors-frontend) avec son propre
# render.yaml (Static Site). Les deux Blueprints sont déployés indépendamment
# sur Render ; CORS_ORIGINS ci-dessus doit pointer vers l'URL publique du
# frontend une fois celui-ci déployé.
